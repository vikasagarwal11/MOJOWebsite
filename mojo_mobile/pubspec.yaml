name: mojo_mobile
description: "High-performance Flutter mobile application for Mom Fitness Mojo (MOJO)."
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  
  # State Management & Routing
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^14.0.0

  # Firebase (Backend Integration)
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  firebase_storage: ^12.0.0
  firebase_messaging: ^15.0.0
  cloud_functions: ^5.6.2
  firebase_app_check: ^0.3.2+10

  # UI & UX (Best of the Best)
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10+1
  font_awesome_flutter: ^10.7.0
  glassmorphism_ui: ^0.3.0
  lottie: ^3.1.2
  
  # Chat & Media
  flutter_chat_ui: ^1.6.11
  flutter_chat_types: ^3.6.2
  uuid: ^4.3.3
  image_picker: ^1.0.7
  video_player: ^2.8.2
  chewie: ^1.7.1
  share_plus: ^7.2.2
  path_provider: ^2.1.2
  logger: ^2.4.0
  flutter_dotenv: ^5.1.0
  http: ^1.2.0
  url_launcher: ^6.2.5
  connectivity_plus: ^6.1.0
  rxdart: ^0.28.0
  intl: ^0.19.0
  photo_view: ^0.15.0
  qr_flutter: ^4.1.0

  # Image Processing (photofilters removed — unused; frees `image` ^4 for launcher_icons)
  image: ^4.2.0
  pro_image_editor: 11.3.0
  video_editor: ^3.0.0
  receive_sharing_intent: ^1.8.1
  flutter_stripe: 11.2.0
  shared_preferences: ^2.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  network_image_mock: ^2.1.1
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4

# Valid keys under top-level flutter: are listed in Flutter pubspec docs (assets, fonts, etc.).
flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - .env

# Run after updating PNGs: dart run flutter_launcher_icons
# Replace assets/images/app_icon.png with your final 1024×1024 artwork when ready.
flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/app_icon.png
  min_sdk_android: 21
  adaptive_icon_background: "#F25129"
  adaptive_icon_foreground: assets/images/app_icon.png

# Run after updating PNGs: dart run flutter_native_splash:create
flutter_native_splash:
  color: "#F25129"
  image: assets/images/splash_logo.png
  android_12:
    color: "#F25129"
    image: assets/images/splash_logo.png
  ios: true
  android: true
  web: false

