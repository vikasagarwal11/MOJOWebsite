name: mojo_mobile
description: "High-performance Flutter mobile application for Mom Fitness Mojo (MOJO)."
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  
  # State Management & Routing
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^14.0.0

  # Firebase (Backend Integration)
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  firebase_storage: ^12.0.0
  firebase_messaging: ^15.0.0
  cloud_functions: ^5.6.2

  # UI & UX (Best of the Best)
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10+1
  font_awesome_flutter: ^10.7.0
  glassmorphism_ui: ^0.3.0
  lottie: ^3.1.2
  
  # Chat & Media
  flutter_chat_ui: ^1.6.11
  flutter_chat_types: ^3.6.2
  uuid: ^4.3.3
  image_picker: ^1.0.7
  video_player: ^2.8.2
  chewie: ^1.7.1
  share_plus: ^7.2.2
  path_provider: ^2.1.2
  logger: ^2.4.0
  flutter_dotenv: ^5.1.0
  http: ^1.2.0
  rxdart: ^0.28.0
  intl: ^0.19.0
  photo_view: ^0.15.0
  qr_flutter: ^4.1.0

  # Health & Hardware
  pedometer: ^4.0.1

  # Image Processing & Filters
  photofilters: ^3.0.1
  image: ^3.3.0
  pro_image_editor: 11.3.0
  video_editor: ^3.0.0
  receive_sharing_intent: ^1.8.1
  flutter_stripe: 11.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  network_image_mock: ^2.1.1

# Valid keys under top-level flutter: are listed in Flutter pubspec docs (assets, fonts, etc.).
flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - .env

